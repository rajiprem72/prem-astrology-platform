<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Prem Astrology Platform</title>

<style>

body{
    font-family: Arial;
    max-width:800px;
    margin:auto;
    padding:20px;
}

input,select,textarea{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
}

button{
    padding:12px 20px;
    cursor:pointer;
}

h1{
    text-align:center;
}

</style>

</head>

<body>

<h1>Prem Astrology Platform</h1>

<div style="background:#f5f5f5;padding:15px;border-radius:8px;margin-bottom:20px;">

<h2>Detailed Horoscope Report</h2>

<p><strong>Service Fee:</strong> ₹699</p>

<p><strong>Delivery Time:</strong> Within 30 Minutes</p>

<p><strong>Report Includes:</strong></p>

<ul>
<li>Detailed Horoscope Analysis</li>
<li>Answers to 3 Personal Questions</li>
<li>English Horoscope Report</li>
<li>Preferred Language Report</li>
<li>Email Delivery</li>
<li>WhatsApp Delivery</li>
</ul>

</div>

<form id="orderForm">

<label>Full Name</label> <input type="text" id="name" required>

<label>Gender</label> <select id="gender"> <option>Male</option> <option>Female</option> </select>

<label>Country</label> <input type="text" id="country" required>

<label>Current Residence</label> <input type="text" id="current_residence" required>

<label>WhatsApp Number (with country code)</label> <input type="text" id="whatsapp_number" required>

<label>Email Address</label> <input type="email" id="email" required>

<label>Date of Birth</label> <input type="text" id="date_of_birth" placeholder="DD-MM-YYYY" required>

<label>Time of Birth</label> <input type="text" id="time_of_birth" placeholder="HH:MM" required>

<label>Place of Birth</label> <input type="text" id="place_of_birth" required>

<label>Preferred Language</label> <select id="preferred_language"> <option>English</option> <option>Tamil</option> <option>Hindi</option> <option>Malayalam</option> <option>Telugu</option> <option>Kannada</option> <option>German</option> <option>Malay</option> <option>Sinhala</option> </select>

<label>Question 1</label>

<textarea id="question1"></textarea>

<label>Question 2</label>

<textarea id="question2"></textarea>

<label>Question 3</label>

<textarea id="question3"></textarea>

<label>Delivery Method</label> <select id="delivery_method"> <option>WhatsApp</option> <option>Email</option> <option>Both</option> </select>

<button type="submit">
Pay ₹699 & Submit Order
</button>
</form>

<script>

document.getElementById("orderForm").addEventListener("submit", async function(e){

    e.preventDefault();

    const data = {

        name: document.getElementById("name").value,
        gender: document.getElementById("gender").value,

        country: document.getElementById("country").value,
        current_residence: document.getElementById("current_residence").value,

        whatsapp_number: document.getElementById("whatsapp_number").value,
        email: document.getElementById("email").value,

        date_of_birth: document.getElementById("date_of_birth").value,
        time_of_birth: document.getElementById("time_of_birth").value,
        place_of_birth: document.getElementById("place_of_birth").value,

        preferred_language: document.getElementById("preferred_language").value,

        question1: document.getElementById("question1").value,
        question2: document.getElementById("question2").value,
        question3: document.getElementById("question3").value,

        delivery_method: document.getElementById("delivery_method").value
    };

    const response = await fetch(
        "http://127.0.0.1:8000/submit-order",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify(data)
        }
    );

    const result = await response.json();

    alert(
     "Order Created Successfully\n\n" +
     "Order Number : " + result.order_number +
     "\nCustomer : " + result.customer +
     "\nAmount Payable : ₹699" +
     "\nDelivery Time : Within 30 Minutes"
    );

  
});

</script>

</body>
</html>
