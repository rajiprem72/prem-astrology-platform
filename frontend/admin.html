<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>Prem Astrology Admin Dashboard</title>

<style>

body{
    font-family: Arial;
    margin:20px;
}

h1{
    text-align:center;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ccc;
    padding:10px;
    text-align:left;
}

th{
    background-color:#f2f2f2;
}

</style>

</head>

<body>

<h1>Prem Astrology Admin Dashboard</h1>

<table id="customerTable">

<thead>

<tr>
    <th>Order No</th>
    <th>Name</th>
    <th>Country</th>
    <th>Language</th>
    <th>Status</th>
</tr>

</thead>

<tbody>

</tbody>

</table>

<script>

async function loadCustomers(){

    const response = await fetch(
        "http://127.0.0.1:8000/customers"
    );

    const customers = await response.json();

    const tbody =
    document.querySelector("#customerTable tbody");

    tbody.innerHTML = "";

    customers.forEach(customer => {

        const row = document.createElement("tr");

        row.innerHTML = `
            <td>${customer.order_number}</td>
            <td>${customer.name}</td>
            <td>${customer.country}</td>
            <td>${customer.preferred_language}</td>
            <td>${customer.order_status}</td>
        `;

        tbody.appendChild(row);

    });

}

loadCustomers();

</script>

</body>
</html>
